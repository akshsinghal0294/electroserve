spring.application.name=electroserve

# SQL Server Datasource
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=UNIFIED;encrypt=true;trustServerCertificate=true
spring.datasource.username=doeuser
spring.datasource.password=manage
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# Server
server.port=8080

# JWT
app.jwt.secret=YourSuperSecretKeyForJwtTokenGenerationMustBeLongEnough123456789
app.jwt.expiration=86400000

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Logging
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE